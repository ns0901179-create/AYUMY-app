<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden; /* これで余計なスクロールを防ぎます */
    background-color: #000; /* 背景色を黒にしておくと違和感が減ります */
  }
  iframe {
    width: 100%;
    height: calc(100% + 100px); /* 100%に100px足すのがコツです */
    border: none;
    position: absolute;
    top: -50px; /* バナーの高さ分だけ上にずらす */
    left: 0;
  }
</style>
    <link rel="apple-touch-icon" href="icon.png">  
  </head>
  <body>
    <!-- 以下のURLをあなたのGASのWebアプリURLに書き換えてください -->

  </body>
</html>
