<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background-color: #000; /* 背景を黒にしておくと違和感が消えます */
  }

  iframe {
    width: 100%;
    /* 画面全体を覆いつつ、少しだけ下にずらすことでバナーを隠し、
       かつ全体の表示領域を最適化します */
    height: calc(100vh + 10px); 
    border: none;
    display: block;
    margin-top: -5px; 
  }
</style>
    <link rel="apple-touch-icon" href="icon.png">  
  </head>
  <body>
    <!-- 以下のURLをあなたのGASのWebアプリURLに書き換えてください -->
    <iframe src="https://script.google.com/macros/s/AKfycbwavi3OvF_CbpPiB5110A7FXRyAo8gu62RNtzav3niosOEMiPgRBZXg062aqyK9oda6/exec"></iframe>
  </body>
</html>
